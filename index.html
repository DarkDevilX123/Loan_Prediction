<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Approval Prediction</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#000000,#2b0000,#7a0000,#000000);
    background-size:400% 400%;
    animation:bgAnimation 10s ease infinite;
}

@keyframes bgAnimation{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:900px;
    background:rgba(20,20,20,0.8);
    backdrop-filter:blur(15px);
    border:2px solid rgba(255,0,0,0.4);
    border-radius:20px;
    padding:35px;
    box-shadow:0 0 30px rgba(255,0,0,0.5);
}

h1{
    text-align:center;
    color:#ff3c3c;
    margin-bottom:30px;
    font-size:36px;
    letter-spacing:2px;
    text-shadow:0 0 15px red;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.input-box{
    display:flex;
    flex-direction:column;
}

label{
    color:white;
    margin-bottom:8px;
    font-size:15px;
}

input{
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#111;
    color:white;
    font-size:15px;
    border:2px solid #550000;
    transition:.4s;
}

input::placeholder{
    color:#999;
}

input:focus{
    border-color:red;
    box-shadow:0 0 15px red;
}

.button{
    grid-column:span 2;
    text-align:center;
}

button{
    width:250px;
    padding:15px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#ff0000,#7a0000);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.4s;
    letter-spacing:1px;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,0,0,.5);
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px red;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#aaa;
    font-size:14px;
}

@media(max-width:900px){

.container{
    width:95%;
}

form{
    grid-template-columns:1fr;
}

.button{
    grid-column:span 1;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🏦 Loan Approval Prediction System</h1>

<form action="http://127.0.0.1:8000/predict" method="post">

<div class="input-box">
<label>Gender</label>
<input type="number" name="Gender" placeholder="Male = 1 | Female = 0">
</div>

<div class="input-box">
<label>Married</label>
<input type="number" name="Married" placeholder="Yes = 1 | No = 0">
</div>

<div class="input-box">
<label>Dependents</label>
<input type="number" name="Dependents" placeholder="0,1,2,3">
</div>

<div class="input-box">
<label>Education</label>
<input type="number" name="Education" placeholder="Graduate = 0">
</div>

<div class="input-box">
<label>Self Employed</label>
<input type="number" name="Self_Employed" placeholder="Yes = 1 | No = 0">
</div>

<div class="input-box">
<label>Credit History</label>
<input type="number" step="0.1" name="Credit_History" placeholder="0 or 1">
</div>

<div class="input-box">
<label>Property Area</label>
<input type="number" name="Property_Area" placeholder="Urban/Rural Code">
</div>

<div class="input-box">
<label>Loan Amount Term</label>
<input type="number" name="Loan_Amount_Term" placeholder="360">
</div>

<div class="input-box">
<label>Loan Amount</label>
<input type="number" step="0.1" name="LoanAmount" placeholder="Loan Amount">
</div>

<div class="input-box">
<label>Applicant Income</label>
<input type="number" step="0.1" name="ApplicantIncome" placeholder="Monthly Income">
</div>

<div class="input-box">
<label>Coapplicant Income</label>
<input type="number" step="0.1" name="CoapplicantIncome" placeholder="Monthly Income">
</div>

<div class="button">
<button type="submit">🚀 Predict Loan Status</button>
</div>

</form>

<div class="footer">
Powered by FastAPI & Machine Learning
</div>

</div>

</body>
</html>
